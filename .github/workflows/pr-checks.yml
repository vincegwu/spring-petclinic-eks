name: PR Checks — Build and Test

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - "upstream/**"

permissions:
  contents: read

env:
  JAVA_VERSION: "17"

jobs:
  test:
    name: Test — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - config-server
          - discovery-server
          - admin-server
          - customers-service
          - vets-service
          - visits-service
          - genai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run tests — ${{ matrix.service }}
        working-directory: upstream
        run: |
          ./mvnw -pl spring-petclinic-${{ matrix.service }} -am \
            verify -B -q

  kustomize-validate:
    name: Validate Kustomize overlays
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.2/kustomize_v5.4.2_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin/

      - name: Build dev overlay
        run: kustomize build k8s/overlays/dev > /dev/null

      - name: Build prod overlay
        run: kustomize build k8s/overlays/prod > /dev/null

  checkov-k8s:
    name: Checkov — Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan k8s manifests with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: k8s
          framework: kubernetes
          soft_fail: false
