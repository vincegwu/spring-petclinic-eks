name: Terraform — Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm_destroy:
        description: "Type the environment name exactly to confirm. Leave blank to abort — no resources are destroyed."
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.0"

jobs:
  destroy:
    name: Terraform Destroy — ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify destroy confirmation
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "${{ inputs.environment }}" ]]; then
            echo "::error::confirm_destroy must exactly match the target environment ('${{ inputs.environment }}'). Got: '${{ inputs.confirm_destroy }}'. Aborting — no resources were destroyed."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'dev' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ inputs.environment }}
        run: terraform init -input=false

      - name: Clean up orphaned VPC ENIs
        run: |
          CLUSTER_NAME="petclinic-${{ inputs.environment }}"

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${CLUSTER_NAME}-vpc" \
            --query "Vpcs[0].VpcId" \
            --output text)

          if [[ "$VPC_ID" == "None" || -z "$VPC_ID" ]]; then
            echo "No VPC found for ${CLUSTER_NAME}, skipping ENI cleanup."
            exit 0
          fi
          echo "VPC: $VPC_ID"

          # Delete available (detached) ENIs — left behind by VPC CNI after node termination
          AVAILABLE=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=status,Values=available" \
            --query "NetworkInterfaces[*].NetworkInterfaceId" \
            --output text)
          for ENI_ID in $AVAILABLE; do
            echo "Deleting available ENI: $ENI_ID"
            aws ec2 delete-network-interface --network-interface-id "$ENI_ID" || true
          done

          # Detach and delete in-use ENIs not attached to an EC2 instance (e.g. lingering CNI ENIs)
          IN_USE=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=status,Values=in-use" \
            --query "NetworkInterfaces[?Attachment.InstanceOwnerId!='amazon-rds'].NetworkInterfaceId" \
            --output text)
          for ENI_ID in $IN_USE; do
            INSTANCE_ID=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "$ENI_ID" \
              --query "NetworkInterfaces[0].Attachment.InstanceId" \
              --output text)
            # Skip ENIs still attached to a live EC2 instance (Terraform will terminate those)
            if [[ "$INSTANCE_ID" != "None" && -n "$INSTANCE_ID" ]]; then
              echo "Skipping ENI $ENI_ID — attached to instance $INSTANCE_ID"
              continue
            fi
            ATTACHMENT_ID=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "$ENI_ID" \
              --query "NetworkInterfaces[0].Attachment.AttachmentId" \
              --output text)
            if [[ "$ATTACHMENT_ID" != "None" && -n "$ATTACHMENT_ID" ]]; then
              echo "Detaching ENI $ENI_ID (attachment $ATTACHMENT_ID)"
              aws ec2 detach-network-interface --attachment-id "$ATTACHMENT_ID" --force || true
              sleep 5
            fi
            echo "Deleting in-use ENI: $ENI_ID"
            aws ec2 delete-network-interface --network-interface-id "$ENI_ID" || true
          done

          echo "ENI cleanup complete."

      - name: Terraform Destroy
        working-directory: terraform/environments/${{ inputs.environment }}
        env:
          TF_VAR_azure_openai_key: ${{ secrets.AZURE_OPENAI_KEY }}
          TF_VAR_azure_openai_endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
          TF_VAR_github_repo_url: https://github.com/${{ github.repository }}.git
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: terraform destroy -input=false -auto-approve
