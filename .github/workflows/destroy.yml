name: Terraform — Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod
      confirm_destroy:
        description: "Type the environment name exactly to confirm. Leave blank to abort — no resources are destroyed."
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.0"

jobs:
  destroy:
    name: Terraform Destroy — ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify destroy confirmation
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "${{ inputs.environment }}" ]]; then
            echo "::error::confirm_destroy must exactly match the target environment ('${{ inputs.environment }}'). Got: '${{ inputs.confirm_destroy }}'. Aborting — no resources were destroyed."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.environment == 'dev' && secrets.AWS_ROLE_ARN_DEV || secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ inputs.environment }}
        run: terraform init -input=false

      - name: Delete load balancers and security groups created by in-cluster controllers
        run: |
          CLUSTER_NAME="petclinic-${{ inputs.environment }}"

          # ALBs/NLBs and their security groups (one shared "backend traffic" SG plus one
          # per ALB) are provisioned by the AWS Load Balancer Controller via k8s Ingress/Service
          # resources (api-gateway, Grafana, ArgoCD) and are never in Terraform state — only the
          # controller's IRSA role/policy are. If left alive, they block subnet, Internet Gateway,
          # and ultimately VPC deletion indefinitely, hanging "terraform destroy" on module.vpc.
          LB_ARNS=$(aws resourcegroupstaggingapi get-resources \
            --resource-type-filters elasticloadbalancing:loadbalancer \
            --tag-filters "Key=elbv2.k8s.aws/cluster,Values=${CLUSTER_NAME}" \
            --query "ResourceTagMappingList[*].ResourceARN" \
            --output text)

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${CLUSTER_NAME}-vpc" \
            --query "Vpcs[0].VpcId" \
            --output text)

          if [[ -z "$LB_ARNS" ]]; then
            echo "No load balancers tagged for ${CLUSTER_NAME}."
          else
            for ARN in $LB_ARNS; do
              echo "Deleting load balancer: $ARN"
              aws elbv2 delete-load-balancer --load-balancer-arn "$ARN" || true
            done

            echo "Waiting for load balancer ENIs to release in ${VPC_ID}..."
            for i in $(seq 1 30); do
              REMAINING=$(aws ec2 describe-network-interfaces \
                --filters "Name=vpc-id,Values=${VPC_ID}" "Name=description,Values=ELB app/*" \
                --query "NetworkInterfaces[*].NetworkInterfaceId" \
                --output text)
              if [[ -z "$REMAINING" ]]; then
                echo "All load balancer ENIs released."
                break
              fi
              echo "Still waiting on ENIs: $REMAINING"
              sleep 10
            done
          fi

          # Runs regardless of whether any load balancers were found above — on a re-run
          # after the LBs are already gone, their security groups can still be left behind.
          SG_IDS=$(aws resourcegroupstaggingapi get-resources \
            --resource-type-filters ec2:security-group \
            --tag-filters "Key=elbv2.k8s.aws/cluster,Values=${CLUSTER_NAME}" \
            --query "ResourceTagMappingList[*].ResourceARN" \
            --output text | sed 's#.*/##')

          if [[ -z "$SG_IDS" ]]; then
            echo "No load-balancer-controller security groups tagged for ${CLUSTER_NAME}."
          else
            for SG_ID in $SG_IDS; do
              echo "Deleting security group: $SG_ID"
              aws ec2 delete-security-group --group-id "$SG_ID" || true
            done
          fi

      - name: Clean up orphaned VPC ENIs
        run: |
          CLUSTER_NAME="petclinic-${{ inputs.environment }}"

          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${CLUSTER_NAME}-vpc" \
            --query "Vpcs[0].VpcId" \
            --output text)

          if [[ "$VPC_ID" == "None" || -z "$VPC_ID" ]]; then
            echo "No VPC found for ${CLUSTER_NAME}, skipping ENI cleanup."
            exit 0
          fi
          echo "VPC: $VPC_ID"

          # Delete available (detached) ENIs — left behind by VPC CNI after node termination
          AVAILABLE=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=status,Values=available" \
            --query "NetworkInterfaces[*].NetworkInterfaceId" \
            --output text)
          for ENI_ID in $AVAILABLE; do
            echo "Deleting available ENI: $ENI_ID"
            aws ec2 delete-network-interface --network-interface-id "$ENI_ID" || true
          done

          # Detach and delete in-use ENIs not attached to an EC2 instance (e.g. lingering CNI ENIs)
          # Only consider ENIs owned by this account — EKS control-plane and other service-owned
          # ENIs have a different InstanceOwnerId and cannot be detached (AuthFailure).
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IN_USE=$(aws ec2 describe-network-interfaces \
            --filters "Name=vpc-id,Values=${VPC_ID}" "Name=status,Values=in-use" \
            --query "NetworkInterfaces[?Attachment.InstanceOwnerId=='${ACCOUNT_ID}'].NetworkInterfaceId" \
            --output text)
          for ENI_ID in $IN_USE; do
            INSTANCE_ID=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "$ENI_ID" \
              --query "NetworkInterfaces[0].Attachment.InstanceId" \
              --output text)
            # Skip ENIs still attached to a live EC2 instance (Terraform will terminate those)
            if [[ "$INSTANCE_ID" != "None" && -n "$INSTANCE_ID" ]]; then
              echo "Skipping ENI $ENI_ID — attached to instance $INSTANCE_ID"
              continue
            fi
            ATTACHMENT_ID=$(aws ec2 describe-network-interfaces \
              --network-interface-ids "$ENI_ID" \
              --query "NetworkInterfaces[0].Attachment.AttachmentId" \
              --output text)
            if [[ "$ATTACHMENT_ID" != "None" && -n "$ATTACHMENT_ID" ]]; then
              echo "Detaching ENI $ENI_ID (attachment $ATTACHMENT_ID)"
              aws ec2 detach-network-interface --attachment-id "$ATTACHMENT_ID" --force || true
              sleep 5
            fi
            echo "Deleting in-use ENI: $ENI_ID"
            aws ec2 delete-network-interface --network-interface-id "$ENI_ID" || true
          done

          echo "ENI cleanup complete."

      - name: Terraform Destroy
        working-directory: terraform/environments/${{ inputs.environment }}
        env:
          TF_VAR_azure_openai_key: ${{ secrets.AZURE_OPENAI_KEY }}
          TF_VAR_azure_openai_endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          TF_VAR_github_token: ${{ secrets.GH_PAT }}
          TF_VAR_github_repo_url: https://github.com/${{ github.repository }}.git
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERT_ARN }}
          TF_VAR_alertmanager_slack_webhook_url: ${{ secrets.ALERTMANAGER_SLACK_WEBHOOK_URL }}
        run: terraform destroy -input=false -auto-approve
