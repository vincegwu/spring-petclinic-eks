name: CI — Build, Push, and Update Image Tags

on:
  push:
    branches:
      - dev
      - main
    paths:
      - "upstream/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

permissions:
  id-token: write   # Required for OIDC
  contents: write   # Required to commit updated kustomization.yaml

env:
  AWS_REGION: us-east-1
  JAVA_VERSION: "17"

jobs:
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            port: 8080
          - service: config-server
            port: 8888
          - service: discovery-server
            port: 8761
          - service: admin-server
            port: 9090
          - service: customers-service
            port: 8081
          - service: vets-service
            port: 8083
          - service: visits-service
            port: 8082
          - service: genai-service
            port: 8084

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "tag_prefix=prod" >> $GITHUB_OUTPUT
            echo "aws_role_arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "tag_prefix=dev" >> $GITHUB_OUTPUT
            echo "aws_role_arn=${{ secrets.AWS_ROLE_ARN_DEV }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR — ${{ matrix.service }}
        working-directory: upstream
        run: |
          ./mvnw -pl spring-petclinic-${{ matrix.service }} -am \
            package -DskipTests -B -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.env.outputs.aws_role_arn }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SERVICE: ${{ matrix.service }}
          PORT: ${{ matrix.port }}
          TAG_PREFIX: ${{ steps.env.outputs.tag_prefix }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          IMAGE_TAG="${TAG_PREFIX}-${SHORT_SHA}"
          IMAGE_URI="${REGISTRY}/spring-petclinic/${SERVICE}:${IMAGE_TAG}"

          # Resolve the built JAR (version comes from Maven)
          JAR_PATH=$(ls upstream/spring-petclinic-${SERVICE}/target/spring-petclinic-${SERVICE}-*.jar | head -1)
          ARTIFACT_NAME="${JAR_PATH%.jar}"

          docker build \
            --build-arg ARTIFACT_NAME="${ARTIFACT_NAME}" \
            --build-arg EXPOSED_PORT="${PORT}" \
            -f upstream/docker/Dockerfile \
            -t "${IMAGE_URI}" \
            .

          echo "image_uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.build.outputs.image_uri }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push Docker image
        run: docker push ${{ steps.build.outputs.image_uri }}

  update-image-tags:
    name: Update kustomization image tags
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only run once all builds succeed
    if: success()

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT or deploy key so the push triggers ArgoCD (GITHUB_TOKEN push
          # does not trigger further workflows but ArgoCD polls directly)
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Determine overlay path and tag prefix
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "overlay=prod" >> $GITHUB_OUTPUT
            echo "tag_prefix=prod" >> $GITHUB_OUTPUT
          else
            echo "overlay=dev" >> $GITHUB_OUTPUT
            echo "tag_prefix=dev" >> $GITHUB_OUTPUT
          fi

      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tar.gz \
            "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.2/kustomize_v5.4.2_linux_amd64.tar.gz"
          tar -xzf /tmp/kustomize.tar.gz -C /usr/local/bin/
          kustomize version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ github.ref_name == 'main' && secrets.AWS_ROLE_ARN_PROD || secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR registry
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update image tags in kustomization overlay
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          OVERLAY: ${{ steps.env.outputs.overlay }}
          TAG_PREFIX: ${{ steps.env.outputs.tag_prefix }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          IMAGE_TAG="${TAG_PREFIX}-${SHORT_SHA}"
          OVERLAY_DIR="k8s/overlays/${OVERLAY}"

          cd "${OVERLAY_DIR}"

          for service in api-gateway config-server discovery-server admin-server \
                         customers-service vets-service visits-service genai-service; do
            kustomize edit set image \
              "${service}=${REGISTRY}/spring-petclinic/${service}:${IMAGE_TAG}"
          done

      - name: Commit and push updated kustomization
        env:
          OVERLAY: ${{ steps.env.outputs.overlay }}
          SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "k8s/overlays/${OVERLAY}/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "No image tag changes to commit"
          else
            git commit -m "ci(${OVERLAY}): update image tags to ${OVERLAY}-${SHORT_SHA} [skip ci]"
            git push origin "${{ github.ref_name }}"
          fi
