apiVersion: v1
kind: Service
metadata:
  name: zipkin
  labels:
    app: zipkin
spec:
  selector:
    app: zipkin
  ports:
    - port: 9411
      targetPort: 9411
      name: http
  # Dev overlay overrides this to NodePort 30411 for direct browser access via IGW.
  # Prod keeps it ClusterIP — traces are still collected, UI access via port-forward if needed.
  type: ClusterIP
