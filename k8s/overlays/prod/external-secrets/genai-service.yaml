apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: genai-service-db-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: genai-service-db-secret
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: petclinic/prod/genai-service/db
        property: url
    - secretKey: username
      remoteRef:
        key: petclinic/prod/genai-service/db
        property: username
    - secretKey: password
      remoteRef:
        key: petclinic/prod/genai-service/db
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: genai-service-azure-openai-secret
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: genai-service-azure-openai-secret
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: petclinic/prod/genai-service/azure-openai
        property: api-key
    - secretKey: endpoint
      remoteRef:
        key: petclinic/prod/genai-service/azure-openai
        property: endpoint
