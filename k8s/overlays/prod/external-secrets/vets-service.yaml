apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vets-service-db-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: vets-service-db-secret
    creationPolicy: Owner
  data:
    - secretKey: url
      remoteRef:
        key: petclinic/prod/vets-service/db
        property: url
    - secretKey: username
      remoteRef:
        key: petclinic/prod/vets-service/db
        property: username
    - secretKey: password
      remoteRef:
        key: petclinic/prod/vets-service/db
        property: password
