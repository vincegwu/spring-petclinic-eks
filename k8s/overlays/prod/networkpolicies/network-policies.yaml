# ── Default deny ──────────────────────────────────────────────────────────────
# All ingress and egress is denied unless explicitly allowed below.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ── DNS egress ────────────────────────────────────────────────────────────────
# All pods need DNS to resolve Kubernetes service names and external hostnames.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ── HTTPS egress ──────────────────────────────────────────────────────────────
# Required for: AWS Secrets Manager, ECR image pulls, GitHub (config-server),
# Azure OpenAI API (genai-service), and Zipkin spans to external collectors.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
---
# ── Intra-namespace traffic ───────────────────────────────────────────────────
# Allows all pod-to-pod communication within petclinic-prod (Eureka registration,
# inter-service HTTP calls, Zipkin span reporting).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# ── ALB → api-gateway ─────────────────────────────────────────────────────────
# The ALB operates in IP mode: its health checks and request traffic originate
# from the ALB's private IP addresses within the VPC CIDR (10.1.0.0/16).
# Only api-gateway is internet-facing; all other services are internal-only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alb-to-api-gateway
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.1.0.0/16
      ports:
        - port: 8080
          protocol: TCP
---
# ── Prometheus scraping ───────────────────────────────────────────────────────
# Prometheus runs in the monitoring namespace and scrapes /actuator/prometheus
# on all pods. The namespaceSelector matches the kube-prometheus-stack namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
