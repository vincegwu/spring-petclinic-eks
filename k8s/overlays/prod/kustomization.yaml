apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petclinic-prod

resources:
- ../../base
- namespace.yaml
- external-secrets/customers-service.yaml
- external-secrets/vets-service.yaml
- external-secrets/visits-service.yaml
- external-secrets/genai-service.yaml
- hpa/hpa.yaml
- ingress/api-gateway.yaml
- networkpolicies/network-policies.yaml
- pdb/pdb.yaml

patches:
- path: patches/replicas.yaml
  target:
    kind: Deployment
- path: patches/zipkin-replicas.yaml
  target:
    kind: Deployment
    name: zipkin
- path: patches/resources.yaml
  target:
    kind: Deployment
- path: patches/tracing-sampling.yaml
  target:
    kind: ConfigMap
    name: tracing-config
- path: patches/config-server-env.yaml
  target:
    kind: Deployment
    name: config-server
- path: patches/api-gateway-service.yaml
  target:
    kind: Service
    name: api-gateway

# Image tags are updated automatically by the CI workflow (replaced with prod-<git-sha>).
# PLACEHOLDER-update-via-ci tags must never be deployed; CI overwrites them on every push.
images:
- name: admin-server
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/admin-server
  newTag: prod-ee84730
- name: api-gateway
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/api-gateway
  newTag: prod-ee84730
- name: config-server
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/config-server
  newTag: prod-ee84730
- name: customers-service
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/customers-service
  newTag: prod-ee84730
- name: discovery-server
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/discovery-server
  newTag: prod-ee84730
- name: genai-service
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/genai-service
  newTag: prod-ee84730
- name: openzipkin/zipkin
  newTag: "3.4"
- name: vets-service
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/vets-service
  newTag: prod-ee84730
- name: visits-service
  newName: 205930623242.dkr.ecr.us-east-1.amazonaws.com/spring-petclinic/visits-service
  newTag: prod-ee84730
