- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: JAVA_TOOL_OPTIONS
    value: "-Duser.home=/tmp"
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: SPRING_CLOUD_CONFIG_SERVER_GIT_BASEDIR
    value: /tmp/config-repo
# Spring Cloud Config Server has no spring-boot-starter-actuator on the classpath,
# so /actuator/health/readiness and /actuator/health/liveness (3 segments) get
# intercepted as /{app}/{profile}/{label} and return 404 (NoSuchLabelException).
# /actuator/health (2 segments) is also intercepted as /{app}/{profile} but returns
# 200 with an empty config JSON when the git backend is reachable — which is the
# correct signal for both pod probes and the discovery-server init container check.
- op: replace
  path: /spec/template/spec/containers/0/readinessProbe/httpGet/path
  value: /actuator/health
- op: replace
  path: /spec/template/spec/containers/0/readinessProbe/httpGet/port
  value: 8888
- op: replace
  path: /spec/template/spec/containers/0/livenessProbe/httpGet/path
  value: /actuator/health
- op: replace
  path: /spec/template/spec/containers/0/livenessProbe/httpGet/port
  value: 8888
